<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
</head>
<body>
    <h1>Search Results for "{{ search_term }}"</h1>

    {% if results %}
        <table border="1" cellpadding="8">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
            {% for contact in results %}
            <tr>
                <td>{{ contact[0] }}</td>
                <td>{{ contact[1] }}</td>
                <td>{{ contact[2] }}</td>
                <td>{{ contact[3] }}</td>
                <td>
                    <form action="{{ url_for('delete_contact', contact_id=contact[0]) }}" method="POST" style="display:inline;">
                        <button type="submit", onclick="return confirm('Are you sure you want to delete this contact?');">Delete</button>
                    </form>
                    <form action="{{ url_for('update_contact', contact_id=contact[0]) }}" method="GET" style="display:inline;">
                        <button type="submit">Update</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No contacts found matching "{{ search_term }}".</p>
    {% endif %}

    <p><a href="{{ url_for('index') }}">Back to Contact List</a></p>
    
</body>
</html>
