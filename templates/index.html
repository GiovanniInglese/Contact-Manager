<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
</head>
<body>
    <h1>Contact Manager</h1>

    <p><a href="{{ url_for('add_contact') }}">Add New Contact</a></p>

    {% if contacts %}
        <table border="1" cellpadding="8">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
            {% for contact in contacts %}
            <tr>
                <td>{{ contact[0] }}</td>
                <td>{{ contact[1] }}</td>
                <td>{{ contact[2] }}</td>
                <td>{{ contact[3] }}</td>
                <td>
                    <a href="{{ url_for('edit_contact', contact_id=contact[0]) }}">Edit</a>

                    <form action="{{ url_for('delete_contact', contact_id=contact[0]) }}" method="POST" style="display:inline;">
    <button type="submit" onclick="return confirm('Are you sure you want to delete this contact?');">
        Delete
    </button>
</form>
                </td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No contacts found.</p>
    {% endif %}
</body>
</html>
